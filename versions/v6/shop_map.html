        {id:28,name:"辉业横县鱼生",addr:"宝安区潭头商住楼30号楼",region:"福海",status:"休息中",lat:22.747696,lng:113.846683,district:"宝安区",final_street:"福海"},
        {id:29,name:"鱼生缘横县鱼生店",addr:"宝安区上星社区三村新区六巷6号101",region:"新桥",status:"休息中",lat:22.729211,lng:113.83581,district:"宝安区",final_street:"新桥"},
        {id:30,name:"渔之鲜·横县鱼生·顺德鱼生（沙井分店）",addr:"宝安区沙井街道壆岗三杯路10号",region:"沙井",status:"暂停营业",lat:22.729705,lng:113.821688,district:"宝安区",final_street:"沙井"},
        {id:31,name:"渔匠·横县鱼生·顺德鱼生",addr:"宝安区上星社区上星莲塘中区二巷9号102",region:"新桥",status:"营业中",lat:22.730519,lng:113.834496,district:"宝安区",final_street:"新桥"},
        {id:32,name:"桂来顺横县鱼生",addr:"宝安区新桥街道洋下大道与洋下三路交叉口西80米",region:"新桥",status:"休息中",lat:22.739134,lng:113.839336,district:"宝安区",final_street:"新桥"},
        {id:33,name:"明记横县鱼生大排档",addr:"光明区新湖街道荔都路550号104",region:"凤凰",status:"休息中",lat:22.781381,lng:113.929012,district:"光明区",final_street:"凤凰"},
        {id:34,name:"温记横县鱼生（田寮店）",addr:"光明区田寮社区第五工业区16栋金御湾A栋103",region:"凤凰",status:"休息中",lat:22.7242,lng:113.90235,district:"光明区",final_street:"凤凰"},
        {id:35,name:"横县鱼生（玉泉东路店）",addr:"光明区玉泉东路69号",region:"凤凰",status:"暂无营业时间",lat:22.716781,lng:113.902112,district:"光明区",final_street:"凤凰"},
        {id:36,name:"正宗广西横县鱼生",addr:"光明区南海商业广场（玉律店）",region:"凤凰",status:"暂无营业时间",lat:22.645805,lng:113.924307,district:"宝安区",final_street:"凤凰"},
        {id:37,name:"横县鱼生（绘猫路店）",addr:"光明区绘猫路南边坑新村",region:"凤凰",status:"暂无营业时间",lat:22.778422,lng:113.920994,district:"光明区",final_street:"凤凰"}
    ];

    // 区域颜色（统一街道级）
    const regionColors = {
        "松岗":"#e74c3c",
        "沙井":"#3498db",
        "公明":"#9b59b6",
        "凤凰":"#f39c12",
        "田寮":"#1abc9c",
        "福永":"#e67e22",
        "福海":"#2ecc71",
        "新桥":"#e91e63",
        "新湖":"#795548",
        "燕川":"#00bcd4",
        "玉律":"#ff5722"
    };

    // 状态样式
    const statusClass = {
        "营业中":"popup-status-open","即将营业":"popup-status-soon"
    };

    // ============================================================
    // 地图初始化
    // ============================================================
    // 高德矢量底图（国内可访问）
    const tileLayers = {
        vec: L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            subdomains: "1234",
            attribution: "© 高德地图",
            maxZoom: 18
        }),
        sat: L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
            subdomains: "1234",
            attribution: "© 高德地图",
            maxZoom: 18
        }),
        ter: L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}', {
            subdomains: "1234",
            attribution: "© 高德地图",
            maxZoom: 18
        })
    };

    const map = L.map('map', {
        center: [22.747, 113.87],
        zoom: 12,
        zoomControl: true,
        layers: [tileLayers.vec]
    });

    // 默认加载矢量图层
    tileLayers.vec.addTo(map);

    // 隐藏加载提示
    setTimeout(() => {
        const hint = document.getElementById('loadingHint');
        if (hint) hint.classList.add('hidden');
    }, 2000);

    // ============================================================
    // 区域圈（虚线圆）
    // ============================================================
    const regionCenters = {
        "松岗":[22.764, 113.842],
        "沙井":[22.730, 113.830],
        "公明":[22.783, 113.885],
        "凤凰":[22.753, 113.905],
        "田寮":[22.725, 113.905],
        "福永":[22.685, 113.820],
        "福海":[22.720, 113.810],
        "新桥":[22.738, 113.840],
        "新湖":[22.780, 113.925],
        "燕川":[22.806, 113.865],
        "玉律":[22.645, 113.920]
    };

    Object.entries(regionCenters).forEach(([region, center]) => {
        const color = regionColors[region];
        L.circle(center, {
            radius: 2500,
            color: color,
            fillColor: color,
            fillOpacity: 0.06,
            weight: 2,
            dashArray: '8,6',
            opacity: 0.6
        }).addTo(map).bindPopup(`<b>${region}</b><br>${stores.filter(s=>s.region===region).length} 家门店`);
    });

    // ============================================================
    // 渲染 Marker
    // ============================================================
    const markers = {};
    const markerGroup = L.layerGroup().addTo(map);

    // 门店筛选（全部默认选中）
    let activeStores = new Set(stores.map(s => s.id));
    let activeRegions = new Set(Object.keys(regionColors));

    function getStatusClass(status) {
        if (status === "营业中") return "popup-status-open";
        if (status === "即将营业") return "popup-status-soon";
        return "popup-status-other";
    }

    // 序号补零（3位）
    function formatId(id) {
        return String(id).padStart(3, '0');
    }

    function makePopupContent(store) {
        const sc = getStatusClass(store.status);
        const regionColor = regionColors[store.region] || "#666";
        return `
        <div class="popup-content">
            <div class="popup-header">
                <div class="popup-id">${formatId(store.id)}</div>
                <div class="popup-name">${store.name}</div>
            </div>
            <div class="popup-row">
                <span class="popup-label">序　号</span>
                <span class="popup-value">${formatId(store.id)}</span>
            </div>
            <div class="popup-row">
                <span class="popup-label">地　址</span>
                <span class="popup-value">${store.addr}</span>
            </div>
            <div class="popup-row">
                <span class="popup-label">区　域</span>
                <span class="popup-value"><span class="popup-region" style="background:${regionColor}22;color:${regionColor};border:1px solid ${regionColor}55">${store.region}</span></span>
            </div>
            <div class="popup-row">
                <span class="popup-label">状　态</span>
                <span class="popup-value ${sc}">${store.status}</span>
            </div>
        </div>`;
    }

    function renderMarkers() {
        markerGroup.clearLayers();
        stores.forEach(store => {
            // 区域 + 门店 双重筛选
            const regionOk = activeRegions.has(store.region);
            const storeOk = activeStores.has(store.id);
            if (!regionOk || !storeOk) return;

            const color = regionColors[store.region] || "#666";
            const sc = getStatusClass(store.status);

            // 序号显示三位
            let iconHtml = `<div style="width:36px;height:36px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:white;font-family:'PingFang SC','Microsoft YaHei',sans-serif;cursor:pointer">${formatId(store.id)}</div>`;

            const icon = L.divIcon({
                html: iconHtml,
                className: '',
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });

            const marker = L.marker([store.lat, store.lng], { icon: icon })
                .bindPopup(makePopupContent(store), { maxWidth: 280 })
                .addTo(markerGroup);

            markers[store.id] = marker;
        });
    }

    renderMarkers();

    // ============================================================
    // 区域图例（全选/全不选）
    // ============================================================
    const legendEl = document.getElementById('legend');
    let legendHTML = `
        <div class="legend-title">
            📍 区域图例
            <span class="panel-toggle" style="font-size:10px">点击筛选</span>
        </div>
        <div class="legend-controls">
            <button class="legend-control-btn" onclick="selectAllRegions()">全选</button>
            <button class="legend-control-btn" onclick="deselectAllRegions()">全不选</button>
        </div>`;
    Object.entries(regionColors).forEach(([region, color]) => {
        const count = stores.filter(s => s.region === region).length;
        legendHTML += `<div class="legend-item" id="legend-${region}" onclick="toggleRegion('${region}')">
            <span class="legend-dot" style="background:${color}"></span>
            ${region} (${count})
        </div>`;
    });
    legendEl.innerHTML = legendHTML;

    function toggleRegion(region) {
        if (activeRegions.has(region)) {
            activeRegions.delete(region);
            document.getElementById('legend-' + region).classList.add('inactive');
        } else {
            activeRegions.add(region);
            document.getElementById('legend-' + region).classList.remove('inactive');
        }
        renderMarkers();
    }

    function selectAllRegions() {
        Object.keys(regionColors).forEach(region => {
            activeRegions.add(region);
            const el = document.getElementById('legend-' + region);
            if (el) el.classList.remove('inactive');
        });
        renderMarkers();
    }

    function deselectAllRegions() {
        Object.keys(regionColors).forEach(region => {
            activeRegions.delete(region);
            const el = document.getElementById('legend-' + region);
            if (el) el.classList.add('inactive');
        });
        renderMarkers();
    }

    // ============================================================
    // 门店筛选
    // ============================================================
    const storeFilterList = document.getElementById('storeFilterList');
    let storeFilterHTML = '';
    stores.forEach(s => {
        storeFilterHTML += `<div class="store-item active" id="store-${s.id}" onclick="toggleStore(${s.id})">
            <div class="store-checkbox">✓</div>
            <span class="store-item-id">${formatId(s.id)}</span>
            <span class="store-item-name" title="${s.name}">${s.name.length > 12 ? s.name.substring(0, 12) + '...' : s.name}</span>
        </div>`;
    });
    storeFilterList.innerHTML = storeFilterHTML;

    function toggleStore(id) {
        const el = document.getElementById('store-' + id);
        if (activeStores.has(id)) {
            activeStores.delete(id);
            el.classList.remove('active');
        } else {
            activeStores.add(id);
            el.classList.add('active');
        }
        renderMarkers();
    }

    function selectAllStores() {
        stores.forEach(s => {
            activeStores.add(s.id);
            const el = document.getElementById('store-' + s.id);
            if (el) el.classList.add('active');
        });
        renderMarkers();
    }

    function deselectAllStores() {
        activeStores.clear();
        stores.forEach(s => {
            const el = document.getElementById('store-' + s.id);
            if (el) el.classList.remove('active');
        });
        renderMarkers();
    }

    // ============================================================
    // 面板折叠功能
    // ============================================================
    function togglePanel(panelId) {
        const panel = document.getElementById(panelId);
        panel.classList.toggle('collapsed');
    }

    // ============================================================
    // 搜索功能
    // ============================================================
    function searchStore() {
        const q = document.getElementById('searchInput').value.trim();
        if (!q) return;

        // 关闭所有弹窗
        markerGroup.eachLayer(m => m.closePopup());

        // 精确搜索
        const exact = stores.filter(s => s.name.includes(q));
        if (exact.length > 0) {
            const s = exact[0];
            map.setView([s.lat, s.lng], 15);
            markers[s.id].openPopup();
            return;
        }

        // 模糊搜索
        const fuzzy = stores.filter(s => s.name.includes(q) || s.addr.includes(q) || s.region.includes(q));
        if (fuzzy.length > 0) {
            const bounds = L.latLngBounds(fuzzy.map(s => [s.lat, s.lng]));
            map.fitBounds(bounds, { padding: [50, 50] });
            fuzzy.forEach(s => markers[s.id].openPopup());
        } else {
            alert(`未找到"${q}"相关门店`);
        }
    }

    // ============================================================
    // 底图切换
    // ============================================================
    function switchLayer(type, btn) {
        map.removeLayer(tileLayers.vec);
        map.removeLayer(tileLayers.sat);
        map.removeLayer(tileLayers.ter);
        tileLayers[type].addTo(map);
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // ============================================================
    // 右下角说明
    // ============================================================
    L.control.attribution({prefix: '© 高德地图 | 食为先竞品分析'}).addTo(map);
    </script>
</body>
</html>
